<h4 *ngIf="lat && lon" class="text-center card">Latitude: {{ lat | number }}, Longitude: {{ lon | number }}</h4>

<div class="flex justify-content-evenly">
    <span class="flex flex-column align-items-center">
        <label for="period-type-sant">Period Type</label>
        <p-selectButton
            id="period-type-sant"
            [options]="sentinelPeriods"
            [(ngModel)]="selectedSentinelPeriod"
            class="w-full"
            (onChange)="updateSentinelMaps()"
        ></p-selectButton>
    </span>
    <span class="flex flex-column align-items-center">
        <label for="year-select-sant">Year</label>
        <p-dropdown
            class="w-full"
            id="year-select-sant"
            [options]="sentinelYears"
            [(ngModel)]="selectedSentinelYear"
            (onChange)="updateSentinelMaps()"
        ></p-dropdown>
    </span>
    <span class="flex flex-column align-items-center">
        <label for="vis-params-sant">Visualization Params</label>
        <p-selectButton
            id="vis-params-sant"
            [options]="sentinelVisParams"
            [(ngModel)]="selectedSentinelVisParam"
            class="w-full"
            (onChange)="updateSentinelMaps()"
        ></p-selectButton>
    </span>

    <span class="flex flex-column align-items-center justify-content-end">
        <app-screen-state-clear
            screenKey="map-grid"
            (cleared)="clearFilters()"
        ></app-screen-state-clear>
    </span>
</div>
<div class="flex justify-content-center my-2">
    <button pButton pRipple
        [label]="pointCreationMode ? 'Clique no mapa...' : 'Novo Ponto'"
        [icon]="pointCreationMode ? 'pi pi-map' : 'pi pi-map-marker'"
        [class]="pointCreationMode ? 'p-button-warning' : 'p-button-outlined'"
        (click)="enablePointCreation()"
        [disabled]="pointCreationMode"
        pTooltip="Clique para habilitar a criação de um novo ponto no mapa"
        tooltipPosition="bottom">
    </button>
</div>
<div class="map-grid mt-3" [class.cursor-crosshair]="pointCreationMode">
    <div *ngFor="let map of sentinelMaps" class="map-item">
        <div [id]="map.id" class="map-container"></div>
    </div>
</div>
<app-sentinel-timeseries *ngIf="lat && lon" [lat]="lat" [lon]="lon"></app-sentinel-timeseries>
<app-sentinel-ndwi-timeseries *ngIf="lat && lon" [lat]="lat" [lon]="lon"></app-sentinel-ndwi-timeseries>
