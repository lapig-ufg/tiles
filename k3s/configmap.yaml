apiVersion: v1
kind: ConfigMap
metadata:
  name: tiles-config
  namespace: tiles-loadtest
data:
  TILES_ENV: "production"
  REDIS_URL: "redis://valkey:6379"
  S3_ENDPOINT: "http://minio:9000"
  S3_ACCESS_KEY: "minioadmin"
  S3_SECRET_KEY: "minioadmin"
  S3_BUCKET: "tiles-cache"
  WORKERS: "4"
  MAX_WORKERS_EE: "4"
  WORKER_CONNECTIONS: "1000"
  RATE_LIMIT_PER_MINUTE: "100000"
  LIFESPAN_URL: "24"
  LOG_LEVEL: "INFO"
  GEE_SA_DIRECTORY: "/app/.service-accounts/"
  GEE_SA_COOLDOWN_SECONDS: "60"
  GEE_SA_MAX_RETRIES: "2"
  GEE_SA_HEARTBEAT_INTERVAL: "30"
  GEE_SA_ASSIGNMENT_TTL: "90"
  # MongoDB de teste (cópia de produção via seed-mongodb.sh)
  MONGODB_URL: "mongodb://mongodb:27017"
  MONGODB_DB: "tvi"
  USE_MONGODB_VIS_PARAMS: "true"
