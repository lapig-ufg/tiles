---
apiVersion: v1
kind: Service
metadata:
  name: valkey
  namespace: tiles-loadtest
  labels:
    app: valkey
spec:
  ports:
    - port: 6379
      targetPort: 6379
  selector:
    app: valkey
---
apiVersion: apps/v1
kind: Deployment
metadata:
  name: valkey
  namespace: tiles-loadtest
spec:
  replicas: 1
  selector:
    matchLabels:
      app: valkey
  template:
    metadata:
      labels:
        app: valkey
    spec:
      containers:
        - name: valkey
          image: valkey/valkey:7.2.5
          ports:
            - containerPort: 6379
          command:
            - valkey-server
            - --maxmemory
            - 2gb
            - --maxmemory-policy
            - allkeys-lru
            - --save
            - ""
          resources:
            requests:
              memory: 512Mi
              cpu: 250m
            limits:
              memory: 2Gi
              cpu: "1"
          readinessProbe:
            exec:
              command: ["valkey-cli", "ping"]
            initialDelaySeconds: 5
            periodSeconds: 5
